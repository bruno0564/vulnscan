name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check vulnscan/

      - name: Ruff (format check)
        run: ruff format --check vulnscan/

      - name: Mypy (types)
        run: mypy vulnscan/

      - name: Pytest
        run: pytest
